services:
  postgres:
    image: postgres:16-alpine
    container_name: lrjas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lrjas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-lrjas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lrjas} -d ${POSTGRES_DB:-lrjas}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lrjas

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lrjas-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lrjas}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lrjas}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      MASTER_USER_USERNAME: ${MASTER_USER_USERNAME:-alan}
      MASTER_USER_NAME: ${MASTER_USER_NAME:-Alan}
      MASTER_USER_PASSWORD: ${MASTER_USER_PASSWORD:?Define MASTER_USER_PASSWORD en .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lrjas

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_BASE_PATH: /
    container_name: lrjas-web
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
    depends_on:
      - backend
    networks:
      - lrjas

volumes:
  postgres_data:

networks:
  lrjas:
    driver: bridge
